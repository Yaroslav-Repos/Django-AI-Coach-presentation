{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <h2>Створити аккаунт</h2>
    <div id="errorMessage" style="display: none; background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 0.375rem; margin-bottom: 1rem;"></div>
    <div id="successMessage" style="display: none; background: #dcfce7; color: #166534; padding: 1rem; border-radius: 0.375rem; margin-bottom: 1rem;"></div>
    <form id="registerForm">
        <input type="text" id="regUsername" placeholder="Логін" required minlength="3">
        <input type="password" id="regPassword" placeholder="Пароль" required minlength="6">
        <button type="submit" id="submitBtn">Зареєструватися</button>
    </form>
    <p>Вже маєте аккаунт? <a href="/login/">Увійти</a></p>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');

        try {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Завантаження...';

            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;

            const res = await fetch('/api/register/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {
                successMessage.textContent = 'Успіх! Тепер увійдіть.';
                successMessage.style.display = 'block';
                document.getElementById('registerForm').reset();

                setTimeout(() => {
                    window.location.href = '/login/';
                }, 2000);
            } else {
                errorMessage.textContent = data.error || 'Помилка реєстрації';
                errorMessage.style.display = 'block';
            }
        } catch (error) {
            console.error('Register error:', error);
            errorMessage.textContent = 'Помилка підключення. Спробуйте пізніше.';
            errorMessage.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Зареєструватися';
        }
    });
</script>
{% endblock %}
