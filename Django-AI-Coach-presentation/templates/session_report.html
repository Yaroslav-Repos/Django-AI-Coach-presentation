{% extends 'base.html' %}
{% block content %}
<div class="coach-container">
    <div class="controls" style="flex-direction: column; align-items: stretch; text-align: center;">
        <h2 style="color: var(--accent-primary);">Звіт про тренування #<span id="session-id">-</span></h2>

        <div id="loadingSpinner" style="display: none; text-align: center; padding: 2rem;">
            <p>Завантаження статистики...</p>
        </div>

        <div id="errorMessage" style="display: none; background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 0.375rem; margin-bottom: 1rem;"></div>

        <div id="sessionDetails" style="display: none;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 20px 0;">
                <div class="status-bar" style="flex-direction: column; padding: 20px;">
                    <span style="color: var(--text-dim);">Результат</span>
                    <h1 id="score-val" style="margin: 10px 0; color: var(--success);">--%</h1>
                </div>
                <div class="status-bar" style="flex-direction: column; padding: 20px;">
                    <span style="color: var(--text-dim);">Тривалість</span>
                    <h1 id="duration-val" style="margin: 10px 0;">--:--</h1>
                </div>
                <div class="status-bar" style="flex-direction: column; padding: 20px;">
                    <span style="color: var(--text-dim);">Дата</span>
                    <p id="date-val" style="margin: 10px 0; font-size: 0.9rem;"></p>
                </div>
            </div>

            <div class="status-bar" style="margin-bottom: 20px; flex-direction: column; align-items: flex-start;">
                <span style="color: var(--text-dim); margin-bottom: 10px;">Деталі сесії:</span>
                <div style="width: 100%; display: grid; gap: 10px;">
                    <div style="display: flex; justify-content: space-between; padding: 10px; background: rgba(59, 130, 246, 0.1); border-radius: 0.375rem;">
                        <span>UUID:</span>
                        <strong id="uuid-val" style="font-family: monospace; font-size: 0.9rem;">-</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 10px; background: rgba(59, 130, 246, 0.1); border-radius: 0.375rem;">
                        <span>Час початку:</span>
                        <strong id="start-time">-</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 10px; background: rgba(59, 130, 246, 0.1); border-radius: 0.375rem;">
                        <span>Час завершення:</span>
                        <strong id="end-time">-</strong>
                    </div>
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
            <a href="/dashboard/" class="btn btn-start" style="text-decoration: none;">До історії</a>
            <button id="deleteBtn" class="btn btn-exit">Видалити запис</button>
        </div>
    </div>
</div>

<script>
    const sessUuid = "{{ session_uuid }}";

    async function loadDetail() {
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorMessage = document.getElementById('errorMessage');
        const sessionDetails = document.getElementById('sessionDetails');

        try {
            loadingSpinner.style.display = 'block';
            errorMessage.style.display = 'none';
            sessionDetails.style.display = 'none';

            const response = await AuthManager.fetchWithAuth(`/api/sessions/${sessUuid}/`);

            if (!response) {
                throw new Error('Network error');
            }

            if (!response.ok) {
                if (response.status === 404) {
                    throw new Error('Сесія не знайдена або у вас немає доступу');
                }
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();

    
            document.getElementById('session-id').innerText = data.id;
            document.getElementById('uuid-val').innerText = data.uuid;


            const score = Math.round(data.score);
            document.getElementById('score-val').innerText = score + '%';


            const start = new Date(data.start_time);
            const end = new Date(data.end_time);


            const diff = Math.floor((end - start) / 1000);
            const minutes = Math.floor(diff / 60);
            const seconds = diff % 60;
            document.getElementById('duration-val').innerText = `${minutes}м ${seconds}с`;


            document.getElementById('date-val').innerText = start.toLocaleDateString('uk-UA');
            document.getElementById('start-time').innerText = start.toLocaleTimeString('uk-UA');
            document.getElementById('end-time').innerText = end.toLocaleTimeString('uk-UA');

            sessionDetails.style.display = 'block';

        } catch (error) {
            console.error('Error loading session:', error);
            errorMessage.textContent = `Помилка: ${error.message}`;
            errorMessage.style.display = 'block';
        } finally {
            loadingSpinner.style.display = 'none';
        }
    }

    async function deleteCurrent() {
        if (!confirm('Ви впевнені, що хочете видалити цей звіт?')) return;

        try {
            const response = await AuthManager.fetchWithAuth(`/api/sessions/${sessUuid}/`, {
                method: 'DELETE'
            });

            if (!response) {
                throw new Error('Network error');
            }

            if (response.ok) {
                alert('Звіт видалено');
                window.location.href = '/dashboard/';
            } else if (response.status === 404) {
                alert('Сесія не знайдена');
                window.location.href = '/dashboard/';
            } else {
                throw new Error(`HTTP ${response.status}`);
            }
        } catch (error) {
            console.error('Error deleting session:', error);
            alert(`Помилка при видаленні: ${error.message}`);
        }
    }

    document.getElementById('deleteBtn').addEventListener('click', deleteCurrent);

    document.addEventListener('DOMContentLoaded', () => {
        console.log(' Session report loaded - starting auth auto-refresh');
        AuthManager.startAutoRefresh(10);

        loadDetail();
    });
</script>
{% endblock %}
