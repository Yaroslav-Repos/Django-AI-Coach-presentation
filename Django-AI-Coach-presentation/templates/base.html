{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coach</title>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <script src="{% static 'js/auth.js' %}"></script>
</head>
<body>
    <nav style="background: var(--card); padding: 1rem; display: flex; gap: 2rem; border-bottom: 1px solid #334155; align-items: center; justify-content: space-between;">
        <div style="display: flex; gap: 2rem;">
            <a href="/dashboard/" style="color: var(--text); text-decoration: none; font-weight: 600;">Dashboard</a>
            <a href="/coach/" style="color: var(--text); text-decoration: none; font-weight: 600;">AI Coach</a>
        </div>
        <button id="logoutBtn" style="background: #ef4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; font-weight: 600;">Вихід</button>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>

        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async () => {
                console.log('Logout clicked');
                AuthManager.stopAutoRefresh();
                await AuthManager.logout();
            });
        }
    </script>
</body>
</html>
